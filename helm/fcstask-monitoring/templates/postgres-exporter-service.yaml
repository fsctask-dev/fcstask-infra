{{- if .Values.postgresExporter.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fcstask-monitoring.postgresExporter.fullname" . }}
  labels:
    {{- include "fcstask-monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-exporter
spec:
  type: ClusterIP
  ports:
    - port: 9187
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "fcstask-monitoring.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-exporter
{{- end }}
