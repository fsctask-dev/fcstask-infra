apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fcstask-monitoring.prometheus.fullname" . }}
  labels:
    {{- include "fcstask-monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  entrypoint.sh: |
{{ .Files.Get "files/entrypoint.sh" | indent 4 }}
  rules.yml: |
{{ .Files.Get "files/rules.yml" | indent 4 }}
  prometheus.yml.tmpl: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: {{ .Values.global.cluster | quote }}
        env: {{ .Values.global.env | quote }}

    rule_files:
      - rules.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: fcstask-backend
        metrics_path: /metrics
        static_configs:
          - targets: ["{{ .Values.scrape.backend.host }}:{{ .Values.scrape.backend.port }}"]

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["{{ include "fcstask-monitoring.prometheus.alertmanagerTarget" . }}"]

    remote_write:
      - url: ${GRAFANA_CLOUD_REMOTE_WRITE_URL}
        basic_auth:
          username: ${GRAFANA_CLOUD_REMOTE_WRITE_USERNAME}
          password: ${GRAFANA_CLOUD_REMOTE_WRITE_PASSWORD}
        write_relabel_configs:
          - source_labels: [__name__]
            regex: 'go_gc_pauses_seconds_bucket'
            action: drop
