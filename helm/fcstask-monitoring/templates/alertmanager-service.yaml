apiVersion: v1
kind: Service
metadata:
  name: {{ include "fcstask-monitoring.alertmanager.fullname" . }}
  labels:
    {{- include "fcstask-monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager
spec:
  type: ClusterIP
  ports:
    - port: 9093
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "fcstask-monitoring.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager
